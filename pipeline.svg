    <text x="66" y="532" text-anchor="middle" font-size="11.5" font-weight="700" fill="#ffffff">3</text>
    <text x="88" y="523" font-size="13" font-weight="600" fill="#0f172a">Proyeksi balik ke ruang tiga dimensi</text>
    <text x="88" y="542" font-size="11.5" fill="#0c4a6e">X = (u - cx)·Z / fx · fx = fy = 1272 px · [Pers. 3.7]</text>
  </g>
  <line x1="250" y1="556" x2="250" y2="569" stroke="#7dd3fc" stroke-width="2"/>
  <path d="M 245 569 L 255 569 L 250 576 Z" fill="#7dd3fc"/>

