  <rect x="40" y="284" width="420" height="46" rx="6" fill="#0369a1"/>
  <text x="250" y="305" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">JALUR A — SAMPAH TERAPUNG</text>
  <text x="250" y="322" text-anchor="middle" font-size="11" fill="#bae6fd">objek reguler · rekonstruksi point cloud · convex hull</text>

  <rect x="500" y="284" width="420" height="46" rx="6" fill="#15803d"/>
  <text x="710" y="305" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">JALUR B — SAMPEL RUMPUT LAUT</text>
  <text x="710" y="322" text-anchor="middle" font-size="11" fill="#bbf7d0">objek ireguler · kotak pembatas 3D · metode PLT</text>

  <line x1="250" y1="330" x2="250" y2="341" stroke="#0369a1" stroke-width="2"/>
  <path d="M 245 341 L 255 341 L 250 348 Z" fill="#0369a1"/>
  <line x1="710" y1="330" x2="710" y2="341" stroke="#15803d" stroke-width="2"/>
  <path d="M 705 341 L 715 341 L 710 348 Z" fill="#15803d"/>

  <!-- ===================== JALUR A: LANGKAH ===================== -->
  <g>
    <rect x="40" y="348" width="420" height="56" rx="6" fill="#e0f2fe" stroke="#0369a1" stroke-width="1.5"/>
    <circle cx="66" cy="376" r="12" fill="#0369a1"/>
    <text x="66" y="380" text-anchor="middle" font-size="11.5" font-weight="700" fill="#ffffff">1</text>
    <text x="88" y="371" font-size="13" font-weight="600" fill="#0f172a">Estimasi jarak kamera-objek</text>
    <text x="88" y="390" font-size="11.5" fill="#0c4a6e">D = 47410 / s + 16,159 · s = w + h · [Pers. 3.2]</text>
  </g>
  <line x1="250" y1="404" x2="250" y2="417" stroke="#7dd3fc" stroke-width="2"/>
  <path d="M 245 417 L 255 417 L 250 424 Z" fill="#7dd3fc"/>

  <g>
    <rect x="40" y="424" width="420" height="56" rx="6" fill="#e0f2fe" stroke="#0369a1" stroke-width="1.5"/>
    <circle cx="66" cy="452" r="12" fill="#0369a1"/>
    <text x="66" y="456" text-anchor="middle" font-size="11.5" font-weight="700" fill="#ffffff">2</text>
    <text x="88" y="447" font-size="13" font-weight="600" fill="#0f172a">Penskalaan peta kedalaman metrik</text>
    <text x="88" y="466" font-size="11.5" fill="#0c4a6e">k = D / rata-rata d_rel · [Pers. 3.4-3.6]</text>
  </g>
  <line x1="250" y1="480" x2="250" y2="493" stroke="#7dd3fc" stroke-width="2"/>
