    <rect x="40" y="576" width="420" height="56" rx="6" fill="#e0f2fe" stroke="#0369a1" stroke-width="1.5"/>
    <circle cx="66" cy="604" r="12" fill="#0369a1"/>
    <text x="66" y="608" text-anchor="middle" font-size="11.5" font-weight="700" fill="#ffffff">4</text>
    <text x="88" y="599" font-size="13" font-weight="600" fill="#0f172a">Pembersihan pencilan (SOR)</text>
    <text x="88" y="618" font-size="11.5" fill="#0c4a6e">k = 20 tetangga · α = 1,5 · [Pers. 3.8]</text>
  </g>
  <line x1="250" y1="632" x2="250" y2="645" stroke="#7dd3fc" stroke-width="2"/>
  <path d="M 245 645 L 255 645 L 250 652 Z" fill="#7dd3fc"/>

