    <rect x="500" y="500" width="420" height="56" rx="6" fill="#dcfce7" stroke="#15803d" stroke-width="1.5"/>
    <circle cx="526" cy="528" r="12" fill="#15803d"/>
    <text x="526" y="532" text-anchor="middle" font-size="11.5" font-weight="700" fill="#ffffff">3</text>
    <text x="548" y="523" font-size="13" font-weight="600" fill="#0f172a">Rentang kedalaman (persentil)</text>
    <text x="548" y="542" font-size="11.5" fill="#14532d">s = P95(d_rel) - P5(d_rel) · [Pers. 3.14]</text>
  </g>
  <line x1="710" y1="556" x2="710" y2="569" stroke="#86efac" stroke-width="2"/>
  <path d="M 705 569 L 715 569 L 710 576 Z" fill="#86efac"/>

  <g>
    <rect x="500" y="576" width="420" height="56" rx="6" fill="#dcfce7" stroke="#15803d" stroke-width="1.5"/>
    <circle cx="526" cy="604" r="12" fill="#15803d"/>
    <text x="526" y="608" text-anchor="middle" font-size="11.5" font-weight="700" fill="#ffffff">4</text>
    <text x="548" y="599" font-size="13" font-weight="600" fill="#0f172a">Faktor skala ketebalan per grup</text>
    <text x="548" y="618" font-size="11.5" fill="#14532d">T = s × sz_grup · 1 grup = 6 foto · [Pers. 3.15-3.16]</text>
  </g>
  <line x1="710" y1="632" x2="710" y2="645" stroke="#86efac" stroke-width="2"/>
  <path d="M 705 645 L 715 645 L 710 652 Z" fill="#86efac"/>

  <g>
    <rect x="500" y="652" width="420" height="56" rx="6" fill="#dcfce7" stroke="#15803d" stroke-width="1.5"/>
    <circle cx="526" cy="680" r="12" fill="#15803d"/>
    <text x="526" y="684" text-anchor="middle" font-size="11.5" font-weight="700" fill="#ffffff">5</text>
    <text x="548" y="675" font-size="13" font-weight="600" fill="#0f172a">Volume metode PLT</text>
    <text x="548" y="694" font-size="11.5" fill="#14532d">V = P × L × T · [Pers. 3.17]</text>
  </g>

