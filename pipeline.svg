  <rect x="100" y="110" width="300" height="62" rx="6" fill="#f8fafc" stroke="#475569" stroke-width="1.5"/>
  <text x="250" y="136" text-anchor="middle" font-size="13.5" font-weight="600" fill="#0f172a">YOLO Instance Segmentation</text>
  <text x="250" y="156" text-anchor="middle" font-size="11.5" fill="#475569">mask biner per objek pada tingkat piksel</text>

  <rect x="560" y="110" width="300" height="62" rx="6" fill="#f8fafc" stroke="#475569" stroke-width="1.5"/>
  <text x="710" y="136" text-anchor="middle" font-size="13.5" font-weight="600" fill="#0f172a">Monocular Depth Estimation</text>
  <text x="710" y="156" text-anchor="middle" font-size="11.5" fill="#475569">peta kedalaman padat per piksel</text>

  <!-- penggabungan kembali -->
  <line x1="250" y1="172" x2="250" y2="196" stroke="#94a3b8" stroke-width="2"/>
