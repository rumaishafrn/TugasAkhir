    <text x="66" y="760" text-anchor="middle" font-size="11.5" font-weight="700" fill="#ffffff">6</text>
    <text x="88" y="751" font-size="13" font-weight="600" fill="#0f172a">Konsistensi antar-frame</text>
    <text x="88" y="770" font-size="11.5" fill="#0c4a6e">Hungarian + IoU · trimmed mean (jendela 5)</text>
