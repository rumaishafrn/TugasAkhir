  <rect x="280" y="210" width="400" height="34" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="480" y="232" text-anchor="middle" font-size="12" fill="#475569">Percabangan menurut cara memperoleh ketiga dimensi objek</text>

