<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 990" width="960" height="990" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">

  <!-- Latar putih eksplisit agar tetap terbaca pada mode gelap GitHub -->
  <rect width="960" height="990" fill="#ffffff"/>

  <!-- ============================ MASUKAN ============================ -->
  <rect x="350" y="24" width="260" height="44" rx="6" fill="#f1f5f9" stroke="#475569" stroke-width="1.5"/>
  <text x="480" y="52" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">Citra / Video RGB tunggal</text>

  <!-- percabangan ke dua tahap bersama -->
  <line x1="480" y1="68" x2="480" y2="88" stroke="#94a3b8" stroke-width="2"/>
  <line x1="250" y1="88" x2="710" y2="88" stroke="#94a3b8" stroke-width="2"/>
