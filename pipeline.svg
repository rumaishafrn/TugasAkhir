    <rect x="40" y="652" width="420" height="56" rx="6" fill="#e0f2fe" stroke="#0369a1" stroke-width="1.5"/>
    <circle cx="66" cy="680" r="12" fill="#0369a1"/>
    <text x="66" y="684" text-anchor="middle" font-size="11.5" font-weight="700" fill="#ffffff">5</text>
    <text x="88" y="675" font-size="13" font-weight="600" fill="#0f172a">Volume convex hull dan koreksi</text>
    <text x="88" y="694" font-size="11.5" fill="#0c4a6e">V = V_hull / 1,58 · [Pers. 3.9-3.10]</text>
  </g>
  <line x1="250" y1="708" x2="250" y2="721" stroke="#7dd3fc" stroke-width="2"/>
  <path d="M 245 721 L 255 721 L 250 728 Z" fill="#7dd3fc"/>

