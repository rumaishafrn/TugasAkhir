    <text x="548" y="447" font-size="13" font-weight="600" fill="#0f172a">Dimensi tampak dari mask</text>
    <text x="548" y="466" font-size="11.5" fill="#14532d">P &amp; L via minAreaRect, konversi ke cm · [Pers. 3.11]</text>
